<style>
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --text: #1c1c1a;
    --muted: #6b6b66;
    --border: #e4e2dd;
    --accent: #2f5233;
    --accent-text: #ffffff;
    --danger: #a3402f;
    --pending: #b8860b;
    --paid: #2f5233;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171715;
      --card: #232320;
      --text: #f0efec;
      --muted: #a3a29c;
      --border: #35342f;
      --accent: #6fae76;
      --accent-text: #0f1a10;
      --danger: #e0796a;
      --pending: #e0b84a;
      --paid: #6fae76;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.5;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }
  h1 { font-size: 1.6rem; margin: 0 0 4px; }
  h2 { font-size: 1.1rem; margin: 0 0 12px; }
  p.muted, .muted { color: var(--muted); }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 140px; }
  .stat { text-align: center; }
  .stat .value { font-size: 1.5rem; font-weight: 600; }
  .stat .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin: 12px 0 4px; }
  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.95rem;
    font-weight: 600;
    background: var(--accent);
    color: var(--accent-text);
    margin-top: 14px;
  }
  button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  button.danger { background: var(--danger); color: #fff; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 0.78rem; text-transform: uppercase; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
  .badge.pending { background: color-mix(in srgb, var(--pending) 20%, transparent); color: var(--pending); }
  .badge.paid { background: color-mix(in srgb, var(--paid) 20%, transparent); color: var(--paid); }
  .info-line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .info-line:last-child { border-bottom: none; }
  .copy-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 2px 10px; margin: 0; font-size: 0.78rem; }
  a { color: var(--accent); }
  .error { color: var(--danger); font-size: 0.85rem; margin-top: 8px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tabs button { margin-top: 0; }
  .tabs button.inactive { background: transparent; color: var(--text); border: 1px solid var(--border); }
</style>
